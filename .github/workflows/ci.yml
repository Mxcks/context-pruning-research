name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  verify:
    name: Test, build, and benchmark
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]" build

      - name: Run tests
        run: python -m pytest tests/ -q

      - name: Build package
        run: python -m build --sdist --wheel

      - name: Run benchmark invariants
        env:
          CONTEXT_BENCHMARK_PERFORMANCE_PACKAGES: "20"
          CONTEXT_BENCHMARK_LARGE_PACKAGES: "2"
          CONTEXT_BENCHMARK_COMPARISON_PACKAGES: "40"
        run: python implementation/benchmark.py
